<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 11px; fill: #666; }
    .big-num { font-size: 36px; font-weight: 700; }
    .label { font-size: 13px; fill: #333; font-weight: 500; }
    .sublabel { font-size: 11px; fill: #777; }
    .note { font-size: 10px; fill: #888; }
    .arrow { fill: #1a9988; }
  </style>

  <!-- Title -->
  <text x="310" y="28" text-anchor="middle" class="title">Battery Shipments to Match One Diesel Cargo</text>
  <text x="310" y="46" text-anchor="middle" class="subtitle">Same ship (50,000 DWT Handymax) -- diesel carries 239 GWh equivalent</text>

  <!-- LEFT: Current tech -->
  <g transform="translate(30, 70)">
    <text x="120" y="0" text-anchor="middle" class="label">Current Technology (2025)</text>
    <text x="120" y="18" text-anchor="middle" class="sublabel">126 Wh/kg -- 1.1 GWh per ship</text>

    <!-- Grid of ship blocks: 217 blocks in ~15 x 15 grid -->
    <g transform="translate(0, 30)">
      <!-- 14 rows of 16 = 224 blocks, show 217 filled -->
      <!-- Row by row, each block is 14x10 with 1px gap -->
      <g fill="#3d3d3d" opacity="0.6">
        <!-- Row 1 --><rect x="0" y="0" width="13" height="9" rx="1"/><rect x="15" y="0" width="13" height="9" rx="1"/><rect x="30" y="0" width="13" height="9" rx="1"/><rect x="45" y="0" width="13" height="9" rx="1"/><rect x="60" y="0" width="13" height="9" rx="1"/><rect x="75" y="0" width="13" height="9" rx="1"/><rect x="90" y="0" width="13" height="9" rx="1"/><rect x="105" y="0" width="13" height="9" rx="1"/><rect x="120" y="0" width="13" height="9" rx="1"/><rect x="135" y="0" width="13" height="9" rx="1"/><rect x="150" y="0" width="13" height="9" rx="1"/><rect x="165" y="0" width="13" height="9" rx="1"/><rect x="180" y="0" width="13" height="9" rx="1"/><rect x="195" y="0" width="13" height="9" rx="1"/><rect x="210" y="0" width="13" height="9" rx="1"/><rect x="225" y="0" width="13" height="9" rx="1"/>
        <!-- Row 2 --><rect x="0" y="12" width="13" height="9" rx="1"/><rect x="15" y="12" width="13" height="9" rx="1"/><rect x="30" y="12" width="13" height="9" rx="1"/><rect x="45" y="12" width="13" height="9" rx="1"/><rect x="60" y="12" width="13" height="9" rx="1"/><rect x="75" y="12" width="13" height="9" rx="1"/><rect x="90" y="12" width="13" height="9" rx="1"/><rect x="105" y="12" width="13" height="9" rx="1"/><rect x="120" y="12" width="13" height="9" rx="1"/><rect x="135" y="12" width="13" height="9" rx="1"/><rect x="150" y="12" width="13" height="9" rx="1"/><rect x="165" y="12" width="13" height="9" rx="1"/><rect x="180" y="12" width="13" height="9" rx="1"/><rect x="195" y="12" width="13" height="9" rx="1"/><rect x="210" y="12" width="13" height="9" rx="1"/><rect x="225" y="12" width="13" height="9" rx="1"/>
        <!-- Rows 3-13 (same pattern) -->
        <rect x="0" y="24" width="238" height="9" rx="1"/><rect x="0" y="36" width="238" height="9" rx="1"/><rect x="0" y="48" width="238" height="9" rx="1"/><rect x="0" y="60" width="238" height="9" rx="1"/><rect x="0" y="72" width="238" height="9" rx="1"/><rect x="0" y="84" width="238" height="9" rx="1"/><rect x="0" y="96" width="238" height="9" rx="1"/><rect x="0" y="108" width="238" height="9" rx="1"/><rect x="0" y="120" width="238" height="9" rx="1"/><rect x="0" y="132" width="238" height="9" rx="1"/><rect x="0" y="144" width="238" height="9" rx="1"/>
        <!-- Row 14: partial (217 - 13*16 = 217 - 208 = 9 blocks) -->
        <rect x="0" y="156" width="13" height="9" rx="1"/><rect x="15" y="156" width="13" height="9" rx="1"/><rect x="30" y="156" width="13" height="9" rx="1"/><rect x="45" y="156" width="13" height="9" rx="1"/><rect x="60" y="156" width="13" height="9" rx="1"/><rect x="75" y="156" width="13" height="9" rx="1"/><rect x="90" y="156" width="13" height="9" rx="1"/><rect x="105" y="156" width="13" height="9" rx="1"/><rect x="120" y="156" width="13" height="9" rx="1"/>
      </g>
    </g>
    <text x="120" y="220" text-anchor="middle" class="big-num" fill="#3d3d3d">217</text>
    <text x="120" y="238" text-anchor="middle" class="sublabel">shipments needed</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(290, 165)">
    <polygon points="0,0 30,15 0,30" class="arrow"/>
    <text x="15" y="50" text-anchor="middle" class="note" fill="#1a9988" font-weight="600">15x</text>
    <text x="15" y="62" text-anchor="middle" class="note" fill="#1a9988">fewer</text>
  </g>

  <!-- RIGHT: 2030 tech -->
  <g transform="translate(350, 70)">
    <text x="120" y="0" text-anchor="middle" class="label">2030 Technology</text>
    <text x="120" y="18" text-anchor="middle" class="sublabel">375 Wh/kg -- 18 GWh per ship</text>

    <!-- 15 blocks (14.5 rounded up) -->
    <g transform="translate(30, 30)" fill="#1a9988" opacity="0.85">
      <!-- Row 1: 8 blocks -->
      <rect x="0" y="0" width="20" height="16" rx="2"/><rect x="24" y="0" width="20" height="16" rx="2"/><rect x="48" y="0" width="20" height="16" rx="2"/><rect x="72" y="0" width="20" height="16" rx="2"/><rect x="96" y="0" width="20" height="16" rx="2"/><rect x="120" y="0" width="20" height="16" rx="2"/><rect x="144" y="0" width="20" height="16" rx="2"/><rect x="168" y="0" width="20" height="16" rx="2"/>
      <!-- Row 2: 7 blocks (14.5 total, half block at end) -->
      <rect x="0" y="22" width="20" height="16" rx="2"/><rect x="24" y="22" width="20" height="16" rx="2"/><rect x="48" y="22" width="20" height="16" rx="2"/><rect x="72" y="22" width="20" height="16" rx="2"/><rect x="96" y="22" width="20" height="16" rx="2"/><rect x="120" y="22" width="20" height="16" rx="2"/>
      <!-- Half block -->
      <rect x="144" y="22" width="10" height="16" rx="2" opacity="0.5"/>
    </g>
    <text x="120" y="110" text-anchor="middle" class="big-num" fill="#1a9988">14.5</text>
    <text x="120" y="128" text-anchor="middle" class="sublabel">shipments needed</text>

    <!-- Rechargeable note -->
    <rect x="20" y="148" width="200" height="42" rx="6" fill="#e8f5f2" stroke="#1a9988" stroke-width="1"/>
    <text x="120" y="166" text-anchor="middle" class="sublabel" fill="#1a9988" font-weight="600">But batteries are rechargeable</text>
    <text x="120" y="182" text-anchor="middle" class="note" fill="#1a9988">20 years x 26 trips = 8,600 GWh per ship</text>
  </g>

  <!-- Bottom note -->
  <text x="310" y="308" text-anchor="middle" class="subtitle">One diesel cargo = 48,000 t MDO = 239 GWh at power-plant efficiency</text>
</svg>
