<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 11px; fill: #666; }
    .hub-label { font-size: 11px; font-weight: 600; fill: #1a5276; }
    .spoke-label { font-size: 9px; fill: #666; }
    .legend-text { font-size: 11px; fill: #333; }
    .layer-label { font-size: 10px; font-weight: 600; }
  </style>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" class="title">Hub-and-Spoke Energy Distribution Network</text>
  <text x="350" y="46" text-anchor="middle" class="subtitle">Battery tankers collect charge from hubs and distribute to surrounding islands</text>

  <!-- Ocean background -->
  <rect x="20" y="58" width="660" height="350" rx="8" fill="#e8f4f8"/>

  <!-- Layer 1: Trunk cable from source -->
  <!-- Source node (Australia/Pilbara or domestic) -->
  <rect x="30" y="200" width="80" height="40" rx="6" fill="#f9a825" stroke="#d4a017" stroke-width="1.5"/>
  <text x="70" y="216" text-anchor="middle" class="hub-label" fill="#7a6a10" font-size="9">Pilbara PV</text>
  <text x="70" y="228" text-anchor="middle" class="spoke-label" fill="#7a6a10">or domestic</text>

  <!-- Trunk cables (thick solid lines) -->
  <line x1="110" y1="220" x2="190" y2="160" stroke="#2980b9" stroke-width="3" opacity="0.7"/>
  <line x1="110" y1="220" x2="190" y2="280" stroke="#2980b9" stroke-width="3" opacity="0.7"/>
  <line x1="110" y1="220" x2="220" y2="220" stroke="#2980b9" stroke-width="3" opacity="0.7"/>

  <!-- Hub islands -->
  <!-- Bali -->
  <circle cx="210" cy="150" r="20" fill="#2980b9" opacity="0.85"/>
  <text x="210" y="154" text-anchor="middle" class="hub-label" fill="white" font-size="10">Bali</text>

  <!-- Kupang (NTT) -->
  <circle cx="350" cy="310" r="22" fill="#2980b9" opacity="0.85"/>
  <text x="350" y="314" text-anchor="middle" class="hub-label" fill="white" font-size="10">Kupang</text>

  <!-- Makassar -->
  <circle cx="340" cy="140" r="20" fill="#2980b9" opacity="0.85"/>
  <text x="340" y="144" text-anchor="middle" class="hub-label" fill="white" font-size="10">Makassar</text>

  <!-- Ambon -->
  <circle cx="500" cy="220" r="20" fill="#2980b9" opacity="0.85"/>
  <text x="500" y="224" text-anchor="middle" class="hub-label" fill="white" font-size="10">Ambon</text>

  <!-- Manado -->
  <circle cx="450" cy="100" r="20" fill="#2980b9" opacity="0.85"/>
  <text x="450" y="104" text-anchor="middle" class="hub-label" fill="white" font-size="10">Manado</text>

  <!-- Sorong -->
  <circle cx="600" cy="180" r="20" fill="#2980b9" opacity="0.85"/>
  <text x="600" y="184" text-anchor="middle" class="hub-label" fill="white" font-size="10">Sorong</text>

  <!-- Trunk cables between hubs -->
  <line x1="230" y1="155" x2="320" y2="145" stroke="#2980b9" stroke-width="2.5" opacity="0.5"/>
  <line x1="225" y1="165" x2="335" y2="295" stroke="#2980b9" stroke-width="2.5" opacity="0.5"/>
  <line x1="355" y1="150" x2="435" y2="105" stroke="#2980b9" stroke-width="2.5" opacity="0.5"/>
  <line x1="360" y1="145" x2="485" y2="210" stroke="#2980b9" stroke-width="2.5" opacity="0.5"/>
  <line x1="515" y1="210" x2="585" y2="185" stroke="#2980b9" stroke-width="2.5" opacity="0.5"/>
  <line x1="465" y1="110" x2="490" y2="205" stroke="#2980b9" stroke-width="2.5" opacity="0.5"/>

  <!-- Spoke islands (small dots) with dashed lines to hubs -->
  <!-- Bali spokes -->
  <g fill="#1a9988" opacity="0.7">
    <circle cx="170" cy="105" r="6"/><line x1="176" y1="108" x2="195" y2="140" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="250" cy="110" r="5"/><line x1="245" y1="113" x2="225" y2="140" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="185" cy="190" r="5"/><line x1="190" y1="186" x2="205" y2="165" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Kupang spokes -->
  <g fill="#1a9988" opacity="0.7">
    <circle cx="290" cy="355" r="5"/><line x1="296" y1="350" x2="335" y2="325" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="310" cy="380" r="4"/><line x1="316" y1="375" x2="340" y2="330" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="400" cy="370" r="5"/><line x1="394" y1="365" x2="363" y2="328" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="420" cy="340" r="4"/><line x1="412" y1="337" x2="370" y2="318" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="280" cy="300" r="4"/><line x1="286" y1="303" x2="330" y2="310" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="370" cy="390" r="4"/><line x1="368" y1="385" x2="355" y2="332" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Ambon spokes -->
  <g fill="#1a9988" opacity="0.7">
    <circle cx="540" cy="260" r="5"/><line x1="534" y1="255" x2="515" y2="235" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="530" cy="190" r="4"/><line x1="525" y1="195" x2="515" y2="210" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="470" cy="265" r="5"/><line x1="476" y1="258" x2="492" y2="236" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="550" cy="230" r="4"/><line x1="544" y1="228" x2="520" y2="224" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Sorong spokes -->
  <g fill="#1a9988" opacity="0.7">
    <circle cx="640" cy="145" r="5"/><line x1="634" y1="150" x2="615" y2="170" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="650" cy="215" r="4"/><line x1="644" y1="210" x2="615" y2="190" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="625" cy="240" r="5"/><line x1="620" y1="234" x2="608" y2="197" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Manado spokes -->
  <g fill="#1a9988" opacity="0.7">
    <circle cx="410" cy="72" r="5"/><line x1="418" y1="77" x2="436" y2="90" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="490" cy="80" r="4"/><line x1="484" y1="84" x2="466" y2="95" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="480" cy="130" r="5"/><line x1="474" y1="125" x2="465" y2="115" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 425)">
    <!-- Layer 1 -->
    <line x1="0" y1="8" x2="25" y2="8" stroke="#2980b9" stroke-width="3"/>
    <text x="32" y="12" class="legend-text">Trunk cable (submarine or domestic)</text>
    <!-- Layer 2 -->
    <circle cx="245" cy="8" r="10" fill="#2980b9" opacity="0.85"/>
    <text x="262" y="12" class="legend-text">Charging hub island</text>
    <!-- Layer 3 -->
    <line x1="390" y1="8" x2="415" y2="8" stroke="#1a9988" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="422" cy="8" r="5" fill="#1a9988" opacity="0.7"/>
    <text x="434" y="12" class="legend-text">Battery shuttle to spoke island</text>
  </g>

  <text x="350" y="468" text-anchor="middle" class="subtitle">Existing inter-island shipping routes and ports provide the foundation</text>
</svg>
